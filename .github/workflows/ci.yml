name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Test, typecheck, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests and typecheck
        run: bun run verify

      - name: Validate installer script
        run: sh -n scripts/install.sh

      - name: Validate Raycast package script
        run: bash -n scripts/package-raycast-extension.sh

      - name: Build local binary
        run: bun run build:binary

      - name: Smoke test binary
        run: ./dist/lattice --help

      - name: Install Raycast extension dependencies
        working-directory: raycast-extension
        run: bun install --frozen-lockfile

      - name: Typecheck Raycast extension
        working-directory: raycast-extension
        run: bun run typecheck

      - name: Package compiled Raycast extension
        run: bun run package:raycast
