name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  mac-app:
    name: Test and Build Apple Apps
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Swift tests and builds
        env:
          LATTICE_IOS_DESTINATION: generic/platform=iOS Simulator
          LATTICE_IPAD_DESTINATION: generic/platform=iOS Simulator
        run: bun run verify

      - name: Validate macOS app package scripts
        run: |
          bash -n scripts/build-mac-app.sh
          bash -n scripts/package-mac-app.sh
          bash -n scripts/package-mac-dev-update.sh
          sh -n scripts/install-mac-app.sh

      - name: Build macOS app bundle
        run: bun run mac:bundle

      - name: Package macOS app
        run: bun run package:mac-app
