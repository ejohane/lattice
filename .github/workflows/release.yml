name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests and typecheck
        run: bun run verify

      - name: Validate installer script
        run: sh -n scripts/install.sh

      - name: Validate Raycast package script
        run: bash -n scripts/package-raycast-extension.sh

  build:
    name: Build ${{ matrix.artifact }}
    needs: verify
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: bun-darwin-arm64
            artifact: lattice-darwin-arm64
          - os: macos-15-intel
            target: bun-darwin-x64
            artifact: lattice-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: lattice-linux-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          LATTICE_TARGET="${{ matrix.target }}" \
          LATTICE_OUTFILE="dist/${{ matrix.artifact }}/lattice" \
          bun run build:binary

      - name: Smoke test binary
        run: ./dist/${{ matrix.artifact }}/lattice --help

      - name: Package artifact
        run: |
          mkdir -p "artifacts/${{ matrix.artifact }}"
          cp "dist/${{ matrix.artifact }}/lattice" "artifacts/${{ matrix.artifact }}/lattice"
          cp README.md LICENSE scripts/install.sh "artifacts/${{ matrix.artifact }}/"
          tar -czf "${{ matrix.artifact }}.tar.gz" -C artifacts "${{ matrix.artifact }}"
          shasum -a 256 "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  raycast:
    name: Build Raycast extension artifact
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install Raycast extension dependencies
        working-directory: raycast-extension
        run: bun install --frozen-lockfile

      - name: Typecheck Raycast extension
        working-directory: raycast-extension
        run: bun run typecheck

      - name: Build Raycast extension
        working-directory: raycast-extension
        run: bun run build

      - name: Package Raycast extension
        run: |
          LATTICE_ARTIFACT_DIR=. \
          bun run package:raycast

      - name: Upload Raycast artifact
        uses: actions/upload-artifact@v4
        with:
          name: lattice-raycast-extension
          path: |
            lattice-raycast-extension.tar.gz
            lattice-raycast-extension.tar.gz.sha256

  release:
    name: Semantic release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build
      - raycast
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lattice-*
          merge-multiple: true
          path: release-artifacts

      - name: Publish semantic release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx --no-install semantic-release
