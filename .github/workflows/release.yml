name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Swift tests and builds
        env:
          LATTICE_IOS_DESTINATION: generic/platform=iOS Simulator
          LATTICE_IPAD_DESTINATION: generic/platform=iOS Simulator
        run: bun run verify

      - name: Validate macOS app package scripts
        run: |
          bash -n scripts/build-mac-app.sh
          bash -n scripts/package-mac-app.sh
          bash -n scripts/package-mac-dev-update.sh
          sh -n scripts/install-mac-app.sh

  plan-release:
    name: Plan release
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.plan.outputs.release_created }}
      version: ${{ steps.plan.outputs.version }}
      git_tag: ${{ steps.plan.outputs.git_tag }}
      app_build: ${{ steps.plan.outputs.app_build }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Plan semantic release
        id: plan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/plan-release.mjs

      - name: Upload release notes catalog
        if: steps.plan.outputs.release_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lattice-release-notes
          path: apps/lattice/Sources/LatticeShared/Resources/ReleaseNotes.json

  build:
    name: Build ${{ matrix.mac-app-artifact }}
    needs:
      - verify
      - plan-release
    if: needs.plan-release.outputs.release_created == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            mac-app-artifact: lattice-macos-app-darwin-arm64
            mac-appcast: lattice-macos-appcast-darwin-arm64.xml
          - os: macos-26-intel
            mac-app-artifact: lattice-macos-app-darwin-x64
            mac-appcast: lattice-macos-appcast-darwin-x64.xml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download release notes catalog
        uses: actions/download-artifact@v4
        with:
          name: lattice-release-notes
          path: apps/lattice/Sources/LatticeShared/Resources

      - name: Import Developer ID certificate
        env:
          LATTICE_MACOS_CODESIGN_CERTIFICATE_BASE64: ${{ secrets.LATTICE_MACOS_CODESIGN_CERTIFICATE_BASE64 }}
          LATTICE_MACOS_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.LATTICE_MACOS_CODESIGN_CERTIFICATE_PASSWORD }}
          LATTICE_MACOS_KEYCHAIN_PASSWORD: ${{ secrets.LATTICE_MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$LATTICE_MACOS_CODESIGN_CERTIFICATE_BASE64" ]]; then
            printf 'error: missing LATTICE_MACOS_CODESIGN_CERTIFICATE_BASE64 secret.\n' >&2
            exit 1
          fi
          if [[ -z "$LATTICE_MACOS_CODESIGN_CERTIFICATE_PASSWORD" ]]; then
            printf 'error: missing LATTICE_MACOS_CODESIGN_CERTIFICATE_PASSWORD secret.\n' >&2
            exit 1
          fi
          if [[ -z "$LATTICE_MACOS_KEYCHAIN_PASSWORD" ]]; then
            printf 'error: missing LATTICE_MACOS_KEYCHAIN_PASSWORD secret.\n' >&2
            exit 1
          fi

          certificate_path="$RUNNER_TEMP/lattice-codesign-certificate.p12"
          keychain_path="$RUNNER_TEMP/lattice-codesign.keychain-db"

          printf '%s' "$LATTICE_MACOS_CODESIGN_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$LATTICE_MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$LATTICE_MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -P "$LATTICE_MACOS_CODESIGN_CERTIFICATE_PASSWORD" \
            -k "$keychain_path" \
            -T /usr/bin/codesign
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$LATTICE_MACOS_KEYCHAIN_PASSWORD" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Package macOS app
        env:
          LATTICE_APP_VERSION: ${{ needs.plan-release.outputs.version }}
          LATTICE_APP_BUILD: ${{ needs.plan-release.outputs.app_build }}
          LATTICE_SPARKLE_FEED_URL: https://github.com/${{ github.repository }}/releases/latest/download/${{ matrix.mac-appcast }}
          LATTICE_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.LATTICE_SPARKLE_PUBLIC_ED_KEY }}
          LATTICE_CODESIGN_IDENTITY: ${{ secrets.LATTICE_CODESIGN_IDENTITY }}
        run: |
          if [[ -z "$LATTICE_SPARKLE_PUBLIC_ED_KEY" ]]; then
            printf 'error: missing LATTICE_SPARKLE_PUBLIC_ED_KEY secret for updater-enabled macOS releases.\n' >&2
            exit 1
          fi
          if [[ -z "$LATTICE_CODESIGN_IDENTITY" ]]; then
            printf 'error: missing LATTICE_CODESIGN_IDENTITY secret for updater-enabled macOS releases.\n' >&2
            exit 1
          fi
          LATTICE_MAC_APP_ARTIFACT="${{ matrix.mac-app-artifact }}" \
          LATTICE_ARTIFACT_DIR=. \
          bun run package:mac-app

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.mac-app-artifact }}
          path: |
            ${{ matrix.mac-app-artifact }}.zip
            ${{ matrix.mac-app-artifact }}.zip.sha256

  mac-appcast:
    name: Generate macOS appcast
    needs:
      - build
      - plan-release
    if: needs.plan-release.outputs.release_created == 'true'
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download macOS app artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lattice-macos-app-darwin-*
          merge-multiple: true
          path: release-artifacts

      - name: Resolve Sparkle tools
        run: swift build --package-path apps/lattice -c release

      - name: Generate signed appcast
        env:
          LATTICE_SPARKLE_PRIVATE_ED_KEY: ${{ secrets.LATTICE_SPARKLE_PRIVATE_ED_KEY }}
          LATTICE_SPARKLE_DOWNLOAD_URL_PREFIX: https://github.com/${{ github.repository }}/releases/latest/download/
        run: |
          if [[ -z "$LATTICE_SPARKLE_PRIVATE_ED_KEY" ]]; then
            printf 'error: missing LATTICE_SPARKLE_PRIVATE_ED_KEY secret for Sparkle appcast signing.\n' >&2
            exit 1
          fi

          generate_appcast="apps/lattice/.build/artifacts/sparkle/Sparkle/bin/generate_appcast"
          for artifact in lattice-macos-app-darwin-arm64 lattice-macos-app-darwin-x64; do
            appcast_dir="release-artifacts/appcast-$artifact"
            mkdir -p "$appcast_dir"
            cp "release-artifacts/$artifact.zip" "$appcast_dir/"

            arch="${artifact#lattice-macos-app-}"
            printf '%s' "$LATTICE_SPARKLE_PRIVATE_ED_KEY" \
              | "$generate_appcast" \
                --ed-key-file - \
                --download-url-prefix "$LATTICE_SPARKLE_DOWNLOAD_URL_PREFIX" \
                -o "release-artifacts/lattice-macos-appcast-$arch.xml" \
                "$appcast_dir"
          done

      - name: Upload macOS appcast
        uses: actions/upload-artifact@v4
        with:
          name: lattice-macos-appcast
          path: release-artifacts/lattice-macos-appcast-*.xml

  release:
    name: Semantic release
    needs:
      - plan-release
      - build
      - mac-appcast
    if: needs.plan-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lattice-*
          merge-multiple: true
          path: release-artifacts

      - name: Publish semantic release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx --no-install semantic-release
